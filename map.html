<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte de Bruxelles</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <header>
    <h1>Carte de Bruxelles</h1>
    <nav>
      <a href="Index.html">Accueil</a>
      <a href="map.html">Carte</a>
      <a href="Index.html#contact">Contact</a>
    </nav>
  </header>

  <main>
    <p class="label">Voici une carte de Bruxelles avec la Grand Place indiquée.</p>
    <div id="map" class="map"></div>
  </main>

  <footer>
    <p class="copyright">&copy; 2026 Découvrir Bruxelles</p>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const brusselsCenter = [50.84693434392934, 4.352457057672918];

    const map = L.map('map').setView(brusselsCenter, 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(map);

    // Marker for Grand Place
    L.marker(brusselsCenter)
      .addTo(map)
      .bindPopup('Grand Place, Bruxelles')
      .openPopup();

    // Layer for drinking fountains from open data API
    const fountainsLayer = L.layerGroup().addTo(map);

    const apiUrl =
      "https://bruxellesdata.opendatasoft.com/api/explore/v2.1/catalog/datasets/fontaines-d-eau-potable-gerees-par-la-ville-de-bruxelles/records?where=within_distance(geo_point_2d,%20geom'POINT(4.352457057672918%2050.84693434392934)',%201km)&limit=20";

    fetch(apiUrl)
      .then((response) => response.json())
      .then((data) => {
        const records = data.results || [];
        records.forEach((record) => {
          const point = record.geo_point_2d;
          if (!point || typeof point.lat !== 'number' || typeof point.lon !== 'number') return;

          const marker = L.marker([point.lat, point.lon]);
          const name = record.name_fr || record.name_nl || 'Fontaine';
          const address = record.address_fr || record.address_nl || '';
          const info = `<strong>${name}</strong><br>${address}`;

          marker.bindPopup(info);
          fountainsLayer.addLayer(marker);
        });
      })
      .catch((err) => {
        console.warn('Impossible de charger les fontaines :', err);
      });

    // User position in red
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const userLatLng = [position.coords.latitude, position.coords.longitude];
          L.circleMarker(userLatLng, {
            color: '#c00',
            radius: 10,
            fillColor: '#c00',
            fillOpacity: 0.9,
          })
            .addTo(map)
            .bindPopup('Vous êtes ici')
            .openPopup();
        },
        (err) => {
          console.warn('Impossible d’obtenir la position :', err);
        }
      );
    }
  </script>
</body>
</html>
